AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  HashiCorpQ platforms | GitHub OIDC bootstrap v1.0
  Deployed as a StackSet from the Management account. Creates a per-customer
  GitHub Actions deployment role in the target account, and optionally the
  GitHub OIDC identity provider (set CreateOidcProvider=true ONLY for accounts
  that have never had one - it is a one-per-account singleton).
  Partition-agnostic: all ARNs use AWS::Partition for GovCloud portability.

Parameters:
  GitHubOrg:
    Description: GitHub organization name.
    Type: String
    Default: HashiCorpQ
  GitHubRepo:
    Description: Customer repository name (repo is the customer; programs are directories).
    Type: String
    Default: webIQ
  GitHubEnvironment:
    Description: GitHub environment name gating deploys (convention <customer>-<env>).
    Type: String
    Default: webiq-dev
  CustomerPrefix:
    Description: >-
      Prefix scoping all IAM permissions. Customer stacks must be named
      <CustomerPrefix>-* (e.g. webiq -> webiq-core-networking).
    Type: String
    Default: webiq
    AllowedPattern: ^[a-z][a-z0-9-]{2,20}$
  EnvironmentName:
    Description: Short environment name used in the role name.
    Type: String
    Default: dev
    AllowedValues: [dev, test, prod]
  CreateOidcProvider:
    Description: >-
      Create the GitHub OIDC provider in this account. Singleton - set true only
      if 'aws iam list-open-id-connect-providers' shows no
      token.actions.githubusercontent.com entry in the target account.
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']

Conditions:
  ShouldCreateProvider: !Equals [!Ref CreateOidcProvider, 'true']

Resources:

  GitHubOidcProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: ShouldCreateProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1

  DeploymentRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'gha-deploy-${CustomerPrefix}-${EnvironmentName}'
      Description: !Sub 'GitHub Actions OIDC deployment role for ${GitHubOrg}/${GitHubRepo} (${GitHubEnvironment})'
      MaxSessionDuration: 3600
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: GitHubActionsOIDC
            Effect: Allow
            Principal:
              Federated: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com'
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub:
                  - !Sub 'repo:${GitHubOrg}/${GitHubRepo}:ref:refs/heads/main'
                  - !Sub 'repo:${GitHubOrg}/${GitHubRepo}:pull_request'
                  - !Sub 'repo:${GitHubOrg}/${GitHubRepo}:environment:${GitHubEnvironment}'
      Policies:
        - PolicyName: !Sub '${CustomerPrefix}-cfn-deploy'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: CloudFormationStackOps
                Effect: Allow
                Action:
                  - cloudformation:CreateStack
                  - cloudformation:UpdateStack
                  - cloudformation:DeleteStack
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackEvents
                  - cloudformation:DescribeStackResources
                  - cloudformation:GetTemplate
                  - cloudformation:GetTemplateSummary
                  - cloudformation:CreateChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:DeleteChangeSet
                  - cloudformation:ListChangeSets
                  - cloudformation:DetectStackDrift
                  - cloudformation:DescribeStackDriftDetectionStatus
                  - cloudformation:DescribeStackResourceDrifts
                  - cloudformation:TagResource
                  - cloudformation:UntagResource
                Resource:
                  - !Sub 'arn:${AWS::Partition}:cloudformation:*:${AWS::AccountId}:stack/${CustomerPrefix}-*'
              - Sid: CloudFormationAccountLevelReads
                Effect: Allow
                Action:
                  - cloudformation:ValidateTemplate
                  - cloudformation:ListExports
                  - cloudformation:ListImports
                  - logs:DescribeLogGroups
                Resource: '*'
              - Sid: EC2NetworkingOps
                Effect: Allow
                Action:
                  - ec2:CreateVpc
                  - ec2:DeleteVpc
                  - ec2:ModifyVpcAttribute
                  - ec2:DescribeVpcs
                  - ec2:CreateSubnet
                  - ec2:DeleteSubnet
                  - ec2:ModifySubnetAttribute
                  - ec2:DescribeSubnets
                  - ec2:CreateInternetGateway
                  - ec2:DeleteInternetGateway
                  - ec2:AttachInternetGateway
                  - ec2:DetachInternetGateway
                  - ec2:DescribeInternetGateways
                  - ec2:CreateRouteTable
                  - ec2:DeleteRouteTable
                  - ec2:DescribeRouteTables
                  - ec2:CreateRoute
                  - ec2:DeleteRoute
                  - ec2:ReplaceRoute
                  - ec2:AssociateRouteTable
                  - ec2:DisassociateRouteTable
                  - ec2:CreateNetworkAcl
                  - ec2:DeleteNetworkAcl
                  - ec2:DescribeNetworkAcls
                  - ec2:CreateNetworkAclEntry
                  - ec2:DeleteNetworkAclEntry
                  - ec2:ReplaceNetworkAclEntry
                  - ec2:ReplaceNetworkAclAssociation
                  - ec2:CreateSecurityGroup
                  - ec2:DeleteSecurityGroup
                  - ec2:DescribeSecurityGroups
                  - ec2:AuthorizeSecurityGroupIngress
                  - ec2:RevokeSecurityGroupIngress
                  - ec2:AuthorizeSecurityGroupEgress
                  - ec2:RevokeSecurityGroupEgress
                  - ec2:UpdateSecurityGroupRuleDescriptionsIngress
                  - ec2:UpdateSecurityGroupRuleDescriptionsEgress
                  - ec2:CreateVpcEndpoint
                  - ec2:DeleteVpcEndpoints
                  - ec2:ModifyVpcEndpoint
                  - ec2:DescribeVpcEndpoints
                  - ec2:CreateFlowLogs
                  - ec2:DeleteFlowLogs
                  - ec2:DescribeFlowLogs
                  - ec2:CreateTags
                  - ec2:DeleteTags
                  - ec2:DescribeTags
                  - ec2:DescribeAvailabilityZones
                  - ec2:DescribeAccountAttributes
                  - ec2:CreateLaunchTemplate
                  - ec2:DeleteLaunchTemplate
                  - ec2:ModifyLaunchTemplate
                  - ec2:CreateLaunchTemplateVersion
                  - ec2:DeleteLaunchTemplateVersions
                  - ec2:DescribeLaunchTemplates
                  - ec2:DescribeLaunchTemplateVersions
                  - ec2:GetLaunchTemplateData
                  - ec2:RunInstances
                  - ec2:DescribeInstances
                  - ec2:DescribeImages
                Resource: '*'
              - Sid: IAMRoleOpsScopedToCustomer
                Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:GetRole
                  - iam:UpdateAssumeRolePolicy
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:GetRolePolicy
                  - iam:ListRolePolicies
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:ListAttachedRolePolicies
                  - iam:TagRole
                  - iam:UntagRole
                  - iam:PassRole
                Resource:
                  - !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${CustomerPrefix}-*'
              - Sid: IAMInstanceProfileOps
                Effect: Allow
                Action:
                  - iam:CreateInstanceProfile
                  - iam:DeleteInstanceProfile
                  - iam:GetInstanceProfile
                  - iam:AddRoleToInstanceProfile
                  - iam:RemoveRoleFromInstanceProfile
                  - iam:TagInstanceProfile
                  - iam:UntagInstanceProfile
                Resource:
                  - !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:instance-profile/${CustomerPrefix}-*'
              - Sid: CloudWatchLogsOps
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:DeleteLogGroup
                  - logs:PutRetentionPolicy
                  - logs:DeleteRetentionPolicy
                  - logs:TagResource
                  - logs:UntagResource
                  - logs:ListTagsForResource
                Resource:
                  - !Sub 'arn:${AWS::Partition}:logs:*:${AWS::AccountId}:log-group:/aws/vpc/${CustomerPrefix}-*'
                  - !Sub 'arn:${AWS::Partition}:logs:*:${AWS::AccountId}:log-group:/ecs/${CustomerPrefix}-*'
                  - !Sub 'arn:${AWS::Partition}:logs:*:${AWS::AccountId}:log-group:/ml/${CustomerPrefix}-*'
              - Sid: BudgetsOps
                Effect: Allow
                Action:
                  - budgets:ModifyBudget
                  - budgets:ViewBudget
                  - budgets:TagResource
                  - budgets:UntagResource
                  - budgets:ListTagsForResource
                Resource:
                  - !Sub 'arn:${AWS::Partition}:budgets::${AWS::AccountId}:budget/${CustomerPrefix}-*'
              - Sid: ConfigConformancePackOps
                Effect: Allow
                Action:
                  - config:PutConformancePack
                  - config:DeleteConformancePack
                Resource:
                  - !Sub 'arn:${AWS::Partition}:config:*:${AWS::AccountId}:conformance-pack/${CustomerPrefix}-*'
              - Sid: ConfigReads
                Effect: Allow
                Action:
                  - config:DescribeConformancePacks
                  - config:DescribeConformancePackStatus
                  - config:GetConformancePackComplianceSummary
                Resource: '*'
              - Sid: KmsCreate
                Effect: Allow
                Action:
                  - kms:CreateKey
                Resource: '*'
              - Sid: KmsManage
                Effect: Allow
                Action:
                  - kms:DescribeKey
                  - kms:EnableKeyRotation
                  - kms:DisableKeyRotation
                  - kms:GetKeyRotationStatus
                  - kms:PutKeyPolicy
                  - kms:GetKeyPolicy
                  - kms:ScheduleKeyDeletion
                  - kms:CancelKeyDeletion
                  - kms:EnableKey
                  - kms:DisableKey
                  - kms:TagResource
                  - kms:UntagResource
                  - kms:ListResourceTags
                  - kms:UpdateKeyDescription
                Resource:
                  - !Sub 'arn:${AWS::Partition}:kms:*:${AWS::AccountId}:key/*'
              - Sid: KmsAlias
                Effect: Allow
                Action:
                  - kms:CreateAlias
                  - kms:DeleteAlias
                  - kms:UpdateAlias
                Resource:
                  - !Sub 'arn:${AWS::Partition}:kms:*:${AWS::AccountId}:alias/${CustomerPrefix}-*'
                  - !Sub 'arn:${AWS::Partition}:kms:*:${AWS::AccountId}:key/*'
              - Sid: KmsListReads
                Effect: Allow
                Action:
                  - kms:ListAliases
                  - kms:ListKeys
                Resource: '*'
              - Sid: EcsClusterOps
                Effect: Allow
                Action:
                  - ecs:CreateCluster
                  - ecs:DeleteCluster
                  - ecs:DescribeClusters
                  - ecs:UpdateCluster
                  - ecs:PutClusterCapacityProviders
                  - ecs:TagResource
                  - ecs:UntagResource
                  - ecs:ListTagsForResource
                Resource:
                  - !Sub 'arn:${AWS::Partition}:ecs:*:${AWS::AccountId}:cluster/${CustomerPrefix}-*'
              - Sid: EcsReads
                Effect: Allow
                Action:
                  - ecs:DescribeCapacityProviders
                Resource: '*'
              - Sid: AutoScalingOps
                Effect: Allow
                Action:
                  - autoscaling:CreateAutoScalingGroup
                  - autoscaling:UpdateAutoScalingGroup
                  - autoscaling:DeleteAutoScalingGroup
                  - autoscaling:PutScalingPolicy
                  - autoscaling:DeletePolicy
                  - autoscaling:CreateOrUpdateTags
                  - autoscaling:DeleteTags
                  - autoscaling:EnableMetricsCollection
                  - autoscaling:DisableMetricsCollection
                  - autoscaling:SetDesiredCapacity
                Resource:
                  - !Sub 'arn:${AWS::Partition}:autoscaling:*:${AWS::AccountId}:autoScalingGroup:*:autoScalingGroupName/${CustomerPrefix}-*'
              - Sid: AutoScalingReads
                Effect: Allow
                Action:
                  - autoscaling:DescribeAutoScalingGroups
                  - autoscaling:DescribeScalingActivities
                  - autoscaling:DescribePolicies
                  - autoscaling:DescribeAutoScalingInstances
                Resource: '*'
              - Sid: SsmPublicAmiParameter
                Effect: Allow
                Action:
                  - ssm:GetParameters
                  - ssm:GetParameter
                Resource:
                  - !Sub 'arn:${AWS::Partition}:ssm:*::parameter/aws/service/ami-amazon-linux-latest/*'
              - Sid: ComputeServiceLinkedRoles
                Effect: Allow
                Action:
                  - iam:CreateServiceLinkedRole
                  - iam:GetRole
                Resource:
                  - !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:role/aws-service-role/ecs.amazonaws.com/AWSServiceRoleForECS'
                  - !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:role/aws-service-role/autoscaling.amazonaws.com/AWSServiceRoleForAutoScaling'
              - Sid: S3BucketOps
                Effect: Allow
                Action:
                  - s3:CreateBucket
                  - s3:DeleteBucket
                  - s3:ListBucket
                  - s3:GetBucketLocation
                  - s3:GetBucketAcl
                  - s3:PutBucketPolicy
                  - s3:GetBucketPolicy
                  - s3:DeleteBucketPolicy
                  - s3:PutEncryptionConfiguration
                  - s3:GetEncryptionConfiguration
                  - s3:PutBucketVersioning
                  - s3:GetBucketVersioning
                  - s3:PutBucketPublicAccessBlock
                  - s3:GetBucketPublicAccessBlock
                  - s3:PutLifecycleConfiguration
                  - s3:GetLifecycleConfiguration
                  - s3:PutBucketTagging
                  - s3:GetBucketTagging
                  - s3:PutBucketOwnershipControls
                  - s3:GetBucketOwnershipControls
                Resource:
                  - !Sub 'arn:${AWS::Partition}:s3:::${CustomerPrefix}-*'
              - Sid: RdsOps
                Effect: Allow
                Action:
                  - rds:CreateDBSubnetGroup
                  - rds:DeleteDBSubnetGroup
                  - rds:ModifyDBSubnetGroup
                  - rds:CreateDBCluster
                  - rds:DeleteDBCluster
                  - rds:ModifyDBCluster
                  - rds:CreateDBInstance
                  - rds:DeleteDBInstance
                  - rds:ModifyDBInstance
                  - rds:AddTagsToResource
                  - rds:RemoveTagsFromResource
                  - rds:ListTagsForResource
                Resource:
                  - !Sub 'arn:${AWS::Partition}:rds:*:${AWS::AccountId}:subgrp:${CustomerPrefix}-*'
                  - !Sub 'arn:${AWS::Partition}:rds:*:${AWS::AccountId}:cluster:${CustomerPrefix}-*'
                  - !Sub 'arn:${AWS::Partition}:rds:*:${AWS::AccountId}:db:${CustomerPrefix}-*'
                  - !Sub 'arn:${AWS::Partition}:rds:*:${AWS::AccountId}:cluster-snapshot:${CustomerPrefix}-*'
              - Sid: RdsReads
                Effect: Allow
                Action:
                  - rds:DescribeDBSubnetGroups
                  - rds:DescribeDBClusters
                  - rds:DescribeDBInstances
                  - rds:DescribeDBClusterSnapshots
                  - rds:DescribeGlobalClusters
                Resource: '*'
              - Sid: RdsManagedSecrets
                Effect: Allow
                Action:
                  - secretsmanager:CreateSecret
                  - secretsmanager:DeleteSecret
                  - secretsmanager:DescribeSecret
                  - secretsmanager:TagResource
                  - secretsmanager:UntagResource
                  - secretsmanager:RotateSecret
                  - secretsmanager:UpdateSecret
                Resource:
                  - !Sub 'arn:${AWS::Partition}:secretsmanager:*:${AWS::AccountId}:secret:rds!*'
              - Sid: KmsGrantsForAwsResources
                Effect: Allow
                Action:
                  - kms:CreateGrant
                  - kms:ListGrants
                  - kms:RevokeGrant
                Resource:
                  - !Sub 'arn:${AWS::Partition}:kms:*:${AWS::AccountId}:key/*'
                Condition:
                  Bool:
                    kms:GrantIsForAWSResource: 'true'
              - Sid: RdsServiceLinkedRole
                Effect: Allow
                Action:
                  - iam:CreateServiceLinkedRole
                  - iam:GetRole
                Resource:
                  - !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:role/aws-service-role/rds.amazonaws.com/AWSServiceRoleForRDS'
              - Sid: EcrOps
                Effect: Allow
                Action:
                  - ecr:CreateRepository
                  - ecr:DeleteRepository
                  - ecr:DescribeRepositories
                  - ecr:PutLifecyclePolicy
                  - ecr:GetLifecyclePolicy
                  - ecr:DeleteLifecyclePolicy
                  - ecr:PutImageTagMutability
                  - ecr:PutImageScanningConfiguration
                  - ecr:TagResource
                  - ecr:UntagResource
                  - ecr:ListTagsForResource
                Resource:
                  - !Sub 'arn:${AWS::Partition}:ecr:*:${AWS::AccountId}:repository/${CustomerPrefix}-*'
              - Sid: BedrockGuardrailOps
                Effect: Allow
                Action:
                  - bedrock:CreateGuardrail
                  - bedrock:DeleteGuardrail
                  - bedrock:GetGuardrail
                  - bedrock:UpdateGuardrail
                  - bedrock:TagResource
                  - bedrock:UntagResource
                  - bedrock:ListTagsForResource
                Resource:
                  - !Sub 'arn:${AWS::Partition}:bedrock:*:${AWS::AccountId}:guardrail/*'
              - Sid: BedrockGuardrailCreate
                Effect: Allow
                Action:
                  - bedrock:CreateGuardrail
                Resource: '*'
              - Sid: ConfigConformsServiceLinkedRole
                Effect: Allow
                Action:
                  - iam:CreateServiceLinkedRole
                  - iam:GetRole
                Resource:
                  - !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:role/aws-service-role/config-conforms.amazonaws.com/AWSServiceRoleForConfigConforms'
      Tags:
        - {Key: Customer, Value: !Ref CustomerPrefix}
        - {Key: Environment, Value: !Ref EnvironmentName}
        - {Key: ManagedBy, Value: hashicorpq-platforms-bootstrap}

Outputs:
  DeploymentRoleArn:
    Description: Role ARN for the customer repo workflow DEPLOY_ROLE_ARN.
    Value: !GetAtt DeploymentRole.Arn
