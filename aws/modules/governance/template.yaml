AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  HashiCorpQ platforms | storage module v1.0
  Customer data bucket encrypted with the security module's KMS CMK
  (IMPORTS security - deploy it first with the same NamePrefix).
  Versioned, public-access-blocked, TLS-enforced, lifecycle-managed.

Parameters:
  NamePrefix:
    Description: Customer-program prefix. MUST match the deployed security module.
    Type: String
    Default: webiq-core
    AllowedPattern: ^[a-z][a-z0-9-]{2,30}$
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, test, prod]
  CostCenter:
    Type: String
    Default: Platform
  DataClassification:
    Type: String
    Default: Confidential
  ComplianceProfile:
    Type: String
    Default: commercial
    AllowedValues: [commercial, government]
  NoncurrentVersionExpirationDays:
    Description: Days before noncurrent object versions expire. Government profiles often require longer retention.
    Type: Number
    Default: 90

Resources:

  DataBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub '${NamePrefix}-data-${AWS::AccountId}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID:
                Fn::ImportValue: !Sub '${NamePrefix}-kms-key-arn'
            BucketKeyEnabled: true
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: expire-noncurrent-versions
            Status: Enabled
            NoncurrentVersionExpiration:
              NoncurrentDays: !Ref NoncurrentVersionExpirationDays
          - Id: abort-incomplete-multipart
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7
      Tags:
        - {Key: Name, Value: !Sub '${NamePrefix}-data'}
        - {Key: Environment, Value: !Ref Environment}
        - {Key: CostCenter, Value: !Ref CostCenter}
        - {Key: DataClassification, Value: !Ref DataClassification}
        - {Key: ComplianceProfile, Value: !Ref ComplianceProfile}
        - {Key: ManagedBy, Value: hashicorpq-platforms}

  DataBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref DataBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !GetAtt DataBucket.Arn
              - !Sub '${DataBucket.Arn}/*'
            Condition:
              Bool:
                aws:SecureTransport: 'false'

Outputs:
  BucketName:
    Value: !Ref DataBucket
    Export: {Name: !Sub '${NamePrefix}-data-bucket'}
  BucketArn:
    Value: !GetAtt DataBucket.Arn
    Export: {Name: !Sub '${NamePrefix}-data-bucket-arn'}
