    Export: {Name: !Sub '${NamePrefix}-subnet-web-c'}
  SubnetAppA:
    Value: !Ref SubnetAPPA
    Export: {Name: !Sub '${NamePrefix}-subnet-app-a'}
  SubnetAppB:
    Value: !Ref SubnetAPPB
    Export: {Name: !Sub '${NamePrefix}-subnet-app-b'}
  SubnetAppC:
    Value: !Ref SubnetAPPC
    Export: {Name: !Sub '${NamePrefix}-subnet-app-c'}
  SubnetDbA:
    Value: !Ref SubnetDBA
    Export: {Name: !Sub '${NamePrefix}-subnet-db-a'}
  SubnetDbB:
    Value: !Ref SubnetDBB
    Export: {Name: !Sub '${NamePrefix}-subnet-db-b'}
  SubnetDbC:
    Value: !Ref SubnetDBC
    Export: {Name: !Sub '${NamePrefix}-subnet-db-c'}
  SubnetReservedAOut:
    Value: !Ref SubnetReservedA
    Export: {Name: !Sub '${NamePrefix}-subnet-reserved-a'}
  SubnetReservedBOut:
    Value: !Ref SubnetReservedB
    Export: {Name: !Sub '${NamePrefix}-subnet-reserved-b'}
  SubnetReservedCOut:
    Value: !Ref SubnetReservedC
    Export: {Name: !Sub '${NamePrefix}-subnet-reserved-c'}
  SubnetAiTrainingA:
    Value: !Ref SubnetAITrainingA
    Export: {Name: !Sub '${NamePrefix}-subnet-ai-training-a'}
  SubnetAiTrainingB:
    Value: !Ref SubnetAITrainingB
    Export: {Name: !Sub '${NamePrefix}-subnet-ai-training-b'}
  SubnetAiInferenceA:
    Value: !Ref SubnetAIInferenceA
    Export: {Name: !Sub '${NamePrefix}-subnet-ai-inference-a'}
  SubnetAiInferenceB:
    Value: !Ref SubnetAIInferenceB
    Export: {Name: !Sub '${NamePrefix}-subnet-ai-inference-b'}
  SgBastion:
    Value: !Ref BastionSecurityGroup
    Export: {Name: !Sub '${NamePrefix}-sg-bastion'}
  SgWeb:
    Value: !Ref WebTierSecurityGroup
    Export: {Name: !Sub '${NamePrefix}-sg-web'}
  SgDb:
    Value: !Ref DatabaseSecurityGroup
